<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Training & Certification Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="full-screen-overlay active">
        <div class="ui-box login-box">
            <h2 class="header-text" style="text-align: center; border-bottom: none;">SYSTEM AUTHENTICATION</h2>
            <div style="margin-bottom: 2vh;">
                <label style="display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 0.5vh;">EMPLOYEE ID:</label>
                <input type="text" id="login-id" placeholder="Enter 1001 for Demo" style="width: 100%; padding: 1vh; border: 2px solid var(--border-color);">
            </div>
            <button id="btn-login" style="width: 100%; padding: 1vh; font-weight: bold; background: var(--border-color); color: white; border: none; cursor: pointer;">LOGIN</button>
            <div id="login-error" style="color: var(--danger-color); font-size: 0.8rem; margin-top: 1vh; text-align: center; display: none;">Invalid ID. Try 1001.</div>
        </div>
    </div>

    <div id="loading-screen" class="full-screen-overlay">
        <div class="ascii-container">
            <div id="ascii-text">ESTABLISHING SECURE CONNECTION...</div>
            <div id="ascii-bar">[....................] 0%</div>
        </div>
    </div>

    <div class="content-wrapper" id="main-content">
        <header>
            <span>CORP TRACKER GATEWAY</span>
            <span style="display: flex; gap: 15px; align-items: center;">
                <span id="header-sys-id">SYSTEM ID: ---</span>
                <button id="btn-logout" class="header-btn">LOGOUT</button>
            </span>
        </header>

        <nav id="main-nav">
            <button class="mobile-nav-toggle" id="mobile-nav-toggle">
                <span>&#9776; MENU</span><span class="hamburger-arrow">&#9660;</span>
            </button>
            <div class="nav-item active" id="nav-dash">DASHBOARD</div>
            <div class="nav-item" id="nav-catalog">COURSE CATALOG</div>
            <div class="nav-item" id="nav-certs">CERTIFICATIONS</div>
        </nav>

        <main id="main-stage">
            
            <div id="view-dash" class="view-section active view-grid">
                <section class="left-panel">
                    <div class="ui-box">
                        <div class="header-text">ACTIVE ENROLLMENTS</div>
                        <div id="enrollments-list" class="data-list"></div>
                    </div>
                    <div class="ui-box" style="margin-top: 1.5vh; flex: 1;">
                        <div class="header-text">SYSTEM COMPLIANCE NOTICES</div>
                        <div id="compliance-list" class="data-list"></div>
                    </div>
                </section>
                
                <section class="right-panel">
                    <div class="ui-box h-100">
                        <div class="header-text">RECENT CERTIFICATIONS</div>
                        <div class="cert-grid" id="recent-certs"></div>
                    </div>
                </section>
            </div>

            <div id="view-catalog" class="view-section">
                <div class="ui-box h-100">
                    <div class="header-text">AVAILABLE COURSE CATALOG</div>
                    <div id="courses-content" class="content-grid"></div>
                </div>
            </div>

            <div id="view-certs" class="view-section">
                <div class="ui-box h-100">
                    <div class="header-text">ALL CERTIFICATION RECORDS</div>
                    <div id="certs-content" class="content-grid"></div>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
